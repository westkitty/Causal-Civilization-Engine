<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <title>Causal Civilization Engine observatory emblem</title>
  <defs>
    <linearGradient id="frame" x1="8" y1="4" x2="56" y2="60" gradientUnits="userSpaceOnUse">
      <stop stop-color="#23383c"/>
      <stop offset="1" stop-color="#081013"/>
    </linearGradient>
    <linearGradient id="gold" x1="15" y1="11" x2="49" y2="53" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffe29a"/>
      <stop offset="0.5" stop-color="#d9ad55"/>
      <stop offset="1" stop-color="#9e672c"/>
    </linearGradient>
    <linearGradient id="causal" x1="13" y1="39" x2="50" y2="23" gradientUnits="userSpaceOnUse">
      <stop stop-color="#55d4c5"/>
      <stop offset="1" stop-color="#baf9eb"/>
    </linearGradient>
    <linearGradient id="branch" x1="35" y1="31" x2="51" y2="48" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffc08d"/>
      <stop offset="1" stop-color="#e77e48"/>
    </linearGradient>
    <radialGradient id="core" cx="50%" cy="45%" r="60%">
      <stop stop-color="#21383c"/>
      <stop offset="1" stop-color="#071014"/>
    </radialGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect x="3" y="3" width="58" height="58" rx="15" fill="url(#frame)" stroke="#60837e" stroke-opacity=".45"/>
  <rect x="8" y="8" width="48" height="48" rx="12" fill="url(#core)" stroke="#f6d27c" stroke-opacity=".18"/>

  <path d="M14 43c8-5 14-6 22-2 6 3 10 2 15-2M14 48c8-4 14-5 22-1 6 3 10 2 15-2" fill="none" stroke="#75918c" stroke-width="1.7" stroke-linecap="round" opacity=".55"/>
  <path d="M17 39c5-1 9-3 12-7 4-5 7-9 13-11" fill="none" stroke="url(#causal)" stroke-width="4.2" stroke-linecap="round" filter="url(#glow)"/>
  <path d="M31 31c5 1 8 4 10 8 2 4 5 6 9 7" fill="none" stroke="url(#branch)" stroke-width="4.2" stroke-linecap="round" filter="url(#glow)"/>

  <circle cx="17" cy="39" r="4" fill="#f4f2e9" stroke="#8fb8b1"/>
  <circle cx="42" cy="21" r="4" fill="#55d4c5" stroke="#c8fff4"/>
  <circle cx="50" cy="46" r="4" fill="#f29a61" stroke="#ffd2b5"/>

  <circle cx="32" cy="32" r="16.5" fill="none" stroke="url(#gold)" stroke-width="1.5" stroke-dasharray="2.5 3.5" opacity=".9"/>
  <path d="M32 13v5M32 46v5M13 32h5M46 32h5" stroke="#e8bf68" stroke-width="1.5" stroke-linecap="round" opacity=".8"/>
  <circle cx="32" cy="32" r="3.2" fill="url(#gold)" filter="url(#glow)"/>
</svg>